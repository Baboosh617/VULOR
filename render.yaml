services:
  - type: web
    name: vulor
    env: python
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic ==noinput --clear &&
      python manage.py migrate --noinput
    startCommand: gunicorn vulor.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: vulor.settings
      - key: PORT
        value: "10000"
databases:
  - name: vulor-db
    databaseName: vulor
    user: vulor_user
