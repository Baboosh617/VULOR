services:
  - type: web
    name: vulor-web
    env: python
    buildCommand: "chmod +x predeploy.sh && pip install -r requirements.txt"
    startCommand: "./predeploy.sh && gunicorn vulor.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: vulor.settings
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false  # Render will auto-fill this when connected to PostgreSQL
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DISABLE_COLLECTSTATIC
        value: "1"
