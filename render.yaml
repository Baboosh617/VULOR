services:
  - type: web
    name: vulor
    env: python
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic ==noinput --clear &&
      python manage.py migrate --noinput
    startCommand: gunicorn vulor.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: vulor.settings
      - key: PORT
        value: "10000"
      - key: WEB_CONCURRENCY
        value: "1"  # Only 1 worker on free tier (prevents memory overload)
      - key: GUNICORN_CMD_ARGS
        value: "--timeout 120"  # Increase timeout to 120 seconds
databases:
  - name: vulor-db
    databaseName: vulor
    user: vulor_user
