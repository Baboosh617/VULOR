services:
  - type: web
    name: vulor
    env: python
    buildCommand: |
      chmod +x startup.sh &&
      pip install -r requirements.txt
    startCommand: ./startup.sh
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: vulor.settings
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: vulor-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DEBUG
        value: "False"
databases:
  - name: vulor-db
    databaseName: vulor
    user: vulor_user
