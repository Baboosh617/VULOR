services:
  - type: web
    name: vulor
    env: python
    buildCommand: |
      pip install -r requirements.txt &&
      npm ci &&
      npm run build:css &&
      python manage.py collectstatic --noinput --clear &&
      python manage.py migrate --noinput
    startCommand: gunicorn vulor.wsgi:application --timeout 120 --worker-class gthread --threads 2 --workers 1
    # Render's service filesystem is ephemeral — without this disk every
    # deploy/restart deletes uploaded media (payment receipts are financial
    # records). Mounted at /var/data with MEDIA_ROOT=/var/data/media so ALL
    # media (receipts and product images) persists. Trade-off accepted:
    # attaching a disk disables zero-downtime deploys and horizontal scaling
    # (single-instance store).
    disk:
      name: vulor-media
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: vulor.settings
      - key: PORT
        value: "10000"
      - key: ON_RENDER
        value: "True"
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "vulor.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://vulor.onrender.com"
      - key: SITE_URL
        value: "https://vulor.onrender.com"
      - key: EMAIL_ASYNC_ENABLED
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: BANK_TRANSFER_BANK_NAME
        sync: false
      - key: BANK_TRANSFER_ACCOUNT_NAME
        sync: false
      - key: BANK_TRANSFER_ACCOUNT_NUMBER
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
