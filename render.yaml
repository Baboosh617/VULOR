services:
  - type: web
    name: vulor-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate --noinput &&gunicorn vulor.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: vulor.settings
      - key: PORT
        value: "10000"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: DATABASE_URL
        # Render auto-provides this when you connect a PostgreSQL database
        # We'll set it up in Step 3
        value: ""
      - key: DISABLE_COLLECTSTATIC
        value: "1"  # We'll handle static files properly later
