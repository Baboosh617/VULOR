<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VULOR | Order Cancelled</title>
    <style>
        body { background: #f8f8f8; font-family: Arial, sans-serif; padding: 30px; }
        .container { background: white; padding: 25px; border-radius: 10px; max-width: 600px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Order Cancelled ❌</h2>
        <p>Hi {{ user.first_name }},</p>
        <p>Your order <strong>#{{ order.id }}</strong> has been cancelled.</p>
        <p>If this wasn’t intentional, reply to this email so we can assist.</p>
        <p>— VULOR Team</p>
    </div>
</body>
</html>
