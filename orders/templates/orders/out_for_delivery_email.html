<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VULOR | Out for Delivery</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8f8f8; padding: 30px; }
        .container { background: white; padding: 25px; border-radius: 10px; max-width: 600px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Out For Delivery 📍</h2>
        <p>Hi {{ user.first_name }},</p>
        <p>Your order <strong>#{{ order.id }}</strong> is currently out for delivery.</p>
        <p>Please keep your phone close — our rider might call you.</p>
        <p>— VULOR Team</p>
    </div>
</body>
</html>
