<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 text-white p-6 flex flex-col">
        <h1 class="text-2xl font-bold mb-6">Vulor Admin</h1>

        <nav class="flex flex-col gap-3">
            <a href="{% url 'dashboard:dashboard_home' %}" class="hover:bg-gray-700 p-2 rounded">Home</a>
            <a href="{% url 'dashboard:order_list' %}" class="hover:bg-gray-700 p-2 rounded">Orders</a>
            <a href="{% url 'dashboard:review_list' %}" class="hover:bg-gray-700 p-2 rounded">Reviews</a>
            <a href="{% url 'dashboard:product_list' %}" class="hover:bg-gray-700 p-2 rounded">Products</a>
            <a href="{% url 'dashboard:customer_list' %}" class="hover:bg-gray-700 p-2 rounded">Customers</a>
        </nav>
    </div>

    <!-- Main content -->
    <div class="flex-1 p-8 overflow-auto">
        {% block content %}
        {% endblock %}
    </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>

<script>
    // ── WebSocket for real-time notifications ──────────────────────────────
    // Only connect if Django Channels is available (checks for ws:// support)
    (function () {
        const wsScheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const wsUrl = `${wsScheme}://${window.location.host}/ws/notifications/`;

        function connectWebSocket() {
            const ws = new WebSocket(wsUrl);

            ws.onopen = function () {
                console.log('[WS] Admin notification socket connected.');
            };

            ws.onmessage = function (e) {
                try {
                    const data = JSON.parse(e.data);
                    showAdminNotification(data.text || 'New notification');
                } catch (err) {
                    console.warn('[WS] Could not parse message:', e.data);
                }
            };

            ws.onclose = function () {
                // Retry after 5 seconds — avoids spamming the console on dev
                setTimeout(connectWebSocket, 5000);
            };

            ws.onerror = function (err) {
                // Silently ignore in development — Channels may not be running
                console.warn('[WS] WebSocket error (is Redis/Channels running?):', err.type);
            };
        }

        function showAdminNotification(message) {
            const container = document.getElementById('admin-notifications') || document.body;
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 z-50 bg-blue-600 text-white px-6 py-3 rounded shadow-lg';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        // Only attempt connection if the browser supports WebSocket
        if ('WebSocket' in window) {
            connectWebSocket();
        }
    })();
</script>

</body>
</html>
