<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 text-white p-6 flex flex-col">
        <h1 class="text-2xl font-bold mb-6">Vulor Admin</h1>

        <nav class="flex flex-col gap-3">
            <a href="{% url 'dashboard:dashboard_home' %}" class="hover:bg-gray-700 p-2 rounded">Home</a>
            <a href="{% url 'dashboard:order_list' %}" class="hover:bg-gray-700 p-2 rounded">Orders</a>
            <a href="{% url 'dashboard:review_list' %}" class="hover:bg-gray-700 p-2 rounded">Reviews</a>
            <a href="{% url 'dashboard:product_list' %}" class="hover:bg-gray-700 p-2 rounded">Products</a>
            <a href="{% url 'dashboard:customer_list' %}" class="hover:bg-gray-700 p-2 rounded">Customers</a>
        </nav>
    </div>

    <!-- Main content -->
    <div class="flex-1 p-8 overflow-auto">
        {% block content %}
        {% endblock %}
    </div>

    <div id="new-orders-banner" class="hidden bg-green-600 text-white p-3 text-center cursor-pointer" onclick="ackNewOrders()">
    <span id="new-orders-text"></span> — click to dismiss
</div>
</div>

<script src="https://cdn.tailwindcss.com"></script>

<script>
function pollNewOrders() {
    fetch("{% url 'dashboard:new_orders_check' %}")
        .then(r => r.json())
        .then(data => {
            const banner = document.getElementById('new-orders-banner');
            if (data.new_orders > 0) {
                document.getElementById('new-orders-text').textContent =
                    data.new_orders + ' new order' + (data.new_orders > 1 ? 's' : '');
                banner.classList.remove('hidden');
            } else {
                banner.classList.add('hidden');
            }
        })
        .catch(() => {});
}
function ackNewOrders() {
    fetch("{% url 'dashboard:new_orders_ack' %}").then(() => {
        document.getElementById('new-orders-banner').classList.add('hidden');
    });
}
pollNewOrders();
setInterval(pollNewOrders, 30000);
</script>

</body>
</html>
