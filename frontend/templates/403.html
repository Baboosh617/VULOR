{% extends "base.html" %}

{% block title %}Access Denied - VULOR{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 to-gray-800 px-4">
    <div class="text-center max-w-md">
        <div class="mb-8">
            <div class="text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-orange-500 mb-4">
                403
            </div>
            <div class="w-32 h-1 bg-gradient-to-r from-yellow-500 to-orange-500 mx-auto"></div>
        </div>
        
        <h1 class="text-3xl font-bold text-white mb-4">Access Denied</h1>
        <p class="text-gray-400 mb-8 leading-relaxed">
            You don't have permission to access this page. This area is restricted to authorized users only.
        </p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{% url 'home' %}" 
               class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-3 rounded-full font-semibold hover:from-purple-700 hover:to-pink-700 transition-colors text-center">
                Go Home
            </a>
            {% if not user.is_authenticated %}
            <a href="{% url 'login' %}" 
               class="border border-gray-600 text-gray-300 px-8 py-3 rounded-full font-semibold hover:bg-gray-800 transition-colors text-center">
                Login
            </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
