{% load static %}
<html>
  <body style="font-family: system-ui, sans-serif; background-color: #f9fafb; margin:0; padding:0;">
    <div style="max-width:600px; margin:auto; background-color:#fff; padding:20px; border-radius:8px;">
      <img src="{% static 'vulor_logo.png' %}" style="height:50px; margin-bottom:20px;" alt="VULOR Logo" />
      <h1 style="font-size:24px; font-weight:bold; color:#111827;">How did we do?</h1>
      <p style="font-size:16px; color:#374151;">Hi {{ user.first_name }}, we hope you’re enjoying your recent purchase (order #{{ order.id }}).</p>
      <p style="margin-top:20px; font-size:16px; color:#374151;">We’d love to hear your thoughts. Please leave a review to help us improve.</p>
      <a href="http://localhost:8000/orders/{{ order.id }}/review/" style="display:inline-block; margin-top:20px; padding:10px 20px; background-color:#1f2937; color:#fff; text-decoration:none; border-radius:5px;">Leave a Review</a>
    </div>
  </body>
</html>
