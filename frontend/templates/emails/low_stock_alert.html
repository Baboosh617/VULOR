<html>
  <body style="font-family: system-ui, sans-serif; background-color: #f9fafb; margin:0; padding:0;">
    <div style="max-width:600px; margin:auto; background-color:#fff; padding:20px; border-radius:8px;">
      <h1 style="font-size:24px; font-weight:bold; color:#111827;">Low Stock Alert</h1>
      <p style="font-size:16px; color:#374151;">The product <strong>{{ product.name }}</strong> is running low on stock.</p>
      <p>Current stock: {{ product.inventory_count }}</p>
      <p>Please restock soon to avoid running out.</p>
      <a href="http://localhost:8000/admin/products/{{ product.id }}/change/" style="display:inline-block; margin-top:20px; padding:10px 20px; background-color:#dc2626; color:#fff; text-decoration:none; border-radius:5px;">Update Stock</a>
    </div>
  </body>
</html>
