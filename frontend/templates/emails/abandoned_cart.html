{% load static %}
<html>
  <body style="font-family: system-ui, sans-serif; background-color:#f9fafb; margin:0; padding:0;">
    <div style="max-width:600px; margin:auto; background-color:#fff; padding:20px; border-radius:8px;">
      <img src="{% static 'vulor-logo.png' %}" style="height:50px; margin-bottom:20px;" alt="VULOR Logo" />
      <h1 style="font-size:24px; font-weight:bold; color:#111827;">Hey {{ user.first_name }}, did you forget something?</h1>
      <p style="font-size:16px; color:#374151;">You have items waiting in your cart. Don’t miss out!</p>

      <ul>
        {% for item in cart.items.all %}
          <li>{{ item.product.name }} - Qty: {{ item.quantity }}</li>
        {% endfor %}
      </ul>

      <a href="http://localhost:8000/cart/" style="display:inline-block; margin-top:20px; padding:10px 20px; background-color:#1f2937; color:#fff; text-decoration:none; border-radius:5px;">Return to Cart</a>
    </div>
  </body>
</html>
