{% extends "base.html" %}

{% block title %}Server Error - VULOR{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#F7F7F7] px-4">
    <div class="text-center max-w-md space-y-8">
        <!-- Error Code -->
        <div class="space-y-4">
            <div class="text-9xl font-bold text-[#111111]">500</div>
            <div class="w-24 h-1 bg-[#8E8E93]/30 mx-auto"></div>
        </div>
        
        <!-- Message -->
        <div class="space-y-4">
            <h1 class="text-2xl font-normal text-[#111111]">Server Error</h1>
            <p class="text-[#8E8E93] leading-relaxed">
                Something broke on our side. Our bad.
            </p>
        </div>
        
        <!-- Optional Illustration -->
        <div class="py-4">
            <div class="text-6xl text-[#8E8E93]/30">🔧</div>
            <p class="text-[#8E8E93] text-sm mt-2">Try refreshing or come back later</p>
        </div>
        
        <!-- CTA Buttons -->
        <div class="space-y-6">
            <div>
                <a href="{% url 'home' %}" 
                   class="inline-block bg-[#FF5A1F] text-[#111111] text-base font-medium py-3 px-8 hover:bg-[#FF5A1F]/90 transition-colors duration-300">
                    Back to Home
                </a>
            </div>
            
            <button onclick="window.location.reload()" 
                    class="inline-block border border-[#8E8E93]/30 text-[#111111] text-sm font-normal py-2 px-6 hover:bg-[#111111] hover:text-white transition-colors duration-300">
                Try Refreshing
            </button>
            
            <!-- Contact Option -->
            <div class="pt-8 border-t border-[#8E8E93]/20">
                <p class="text-[#8E8E93] text-sm mb-2">Still having issues?</p>
                <a href="mailto:support@vulor.com" 
                   class="text-[#111111] text-sm hover:text-[#FF5A1F] transition-colors duration-300">
                    Contact Support
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
