{% extends "base.html" %}

{% block title %}Bad Request - VULOR{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-black px-4">
    <div class="text-center max-w-md space-y-8">
        <!-- VULOR Brand Mark -->
        <div class="mb-8">
            <div class="w-20 h-20 border-2 border-[#dc2626] rounded-full flex items-center justify-center mx-auto">
                <span class="text-[#dc2626] text-3xl font-bold">V</span>
            </div>
        </div>
        
        <!-- Error Code -->
        <div class="space-y-4">
            <div class="text-9xl font-bold text-white tracking-tighter">400</div>
            <div class="w-24 h-1 bg-[#333333] mx-auto"></div>
        </div>
        
        <!-- Message -->
        <div class="space-y-4">
            <h1 class="text-2xl font-bold text-white tracking-wide">BAD REQUEST</h1>
            <p class="text-[#cccccc] leading-relaxed tracking-wider">
                OOPS! SOMETHING WENT WRONG WITH YOUR REQUEST.
            </p>
        </div>
        
        <!-- Illustration -->
        <div class="py-4">
            <div class="relative mx-auto w-32 h-32">
                <!-- Broken chain illustration -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-24 h-24 border-2 border-[#333333] rounded-full flex items-center justify-center">
                        <div class="w-16 h-16 border-2 border-[#dc2626] rounded-full flex items-center justify-center">
                            <span class="text-[#dc2626] text-2xl font-bold">!</span>
                        </div>
                    </div>
                </div>
                
                <!-- Broken chain links -->
                <div class="absolute -top-2 left-1/2 transform -translate-x-1/2">
                    <div class="w-8 h-4 bg-[#dc2626] rounded-sm"></div>
                </div>
                <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2">
                    <div class="w-8 h-4 bg-[#333333] rounded-sm"></div>
                </div>
            </div>
            <p class="text-[#666666] text-sm mt-2 tracking-wider">CHECK THE URL OR TRY AGAIN</p>
        </div>
        
        <!-- CTA Buttons -->
        <div class="space-y-4">
            <div>
                <a href="{% url 'home' %}" 
                   class="inline-block bg-[#dc2626] hover:bg-[#b91c1c] text-white text-base font-bold tracking-wider py-3 px-8 transition-all duration-300 border border-[#dc2626]">
                    BACK TO HOME
                </a>
            </div>
            <div>
                <a href="javascript:history.back()" 
                   class="inline-block border border-[#333333] text-[#666666] hover:border-[#dc2626] hover:text-[#dc2626] text-sm font-bold tracking-wider py-2 px-6 transition-all duration-300">
                    GO BACK
                </a>
            </div>
        </div>
        
        <!-- Support link -->
        <div class="pt-8 border-t border-[#333333]">
            <p class="text-[#666666] text-xs tracking-wider mb-2">NEED HELP?</p>
            <a href="{% url 'contact' %}" 
               class="text-[#dc2626] hover:text-white text-sm tracking-wider font-bold transition-colors duration-300">
                CONTACT SUPPORT
            </a>
        </div>
    </div>
</div>

<style>
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
    
    /* Animate the error number */
    .text-9xl {
        animation: float 3s ease-in-out infinite;
    }
    
    /* Animate the exclamation mark */
    .text-2xl {
        animation: pulse 2s ease-in-out infinite;
    }
    
    /* Animate the broken chain links */
    .absolute.-top-2 div {
        animation: float 1.5s ease-in-out infinite;
        animation-delay: 0.5s;
    }
    
    .absolute.-bottom-2 div {
        animation: float 1.5s ease-in-out infinite;
        animation-delay: 1s;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Add ripple effect to main button
        const mainButton = document.querySelector('a[href*="home"]');
        if (mainButton) {
            mainButton.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    border-radius: 50%;
                    background: rgba(255, 255, 255, 0.4);
                    transform: scale(0);
                    animation: ripple 0.6s linear;
                    width: ${size}px;
                    height: ${size}px;
                    top: ${y}px;
                    left: ${x}px;
                    pointer-events: none;
                `;
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        }
        
        // Add CSS for ripple animation if not already present
        if (!document.querySelector('style[data-ripple]')) {
            const style = document.createElement('style');
            style.setAttribute('data-ripple', 'true');
            style.textContent = `
                @keyframes ripple {
                    to {
                        transform: scale(4);
                        opacity: 0;
                    }
                }
                a[href*="home"] {
                    position: relative;
                    overflow: hidden;
                }
            `;
            document.head.appendChild(style);
        }
        
        // Add hover effect to all buttons
        const buttons = document.querySelectorAll('a, button');
        buttons.forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
                this.style.transition = 'transform 0.2s ease';
            });
            
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
        
        // Auto-refresh suggestion after 10 seconds
        setTimeout(() => {
            const refreshDiv = document.createElement('div');
            refreshDiv.className = 'mt-6 p-4 bg-[#111111] border border-[#333333] rounded-lg';
            refreshDiv.innerHTML = `
                <p class="text-[#cccccc] text-sm tracking-wider mb-2">TRY REFRESHING THE PAGE</p>
                <button onclick="window.location.reload()" 
                        class="border border-[#333333] text-[#666666] hover:border-[#dc2626] hover:text-[#dc2626] text-xs font-bold tracking-wider py-1 px-4 transition-all duration-300">
                    REFRESH PAGE
                </button>
            `;
            
            document.querySelector('.space-y-8').appendChild(refreshDiv);
            
            // Fade in animation
            refreshDiv.style.opacity = '0';
            refreshDiv.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                refreshDiv.style.opacity = '1';
            }, 10);
        }, 10000);
    });
</script>
{% endblock %}
