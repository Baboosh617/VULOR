{% extends "base.html" %}

{% block title %}Bad Request - VULOR{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#F7F7F7] px-4">
    <div class="text-center max-w-md space-y-8">
        <!-- Error Code -->
        <div class="space-y-4">
            <div class="text-9xl font-bold text-[#111111]">400</div>
            <div class="w-24 h-1 bg-[#8E8E93]/30 mx-auto"></div>
        </div>
        
        <!-- Message -->
        <div class="space-y-4">
            <h1 class="text-2xl font-normal text-[#111111]">Bad Request</h1>
            <p class="text-[#8E8E93] leading-relaxed">
                Oops! Something went wrong with your request.
            </p>
        </div>
        
        <!-- Optional Illustration -->
        <div class="py-4">
            <div class="text-6xl text-[#8E8E93]/30">📝</div>
            <p class="text-[#8E8E93] text-sm mt-2">Check the URL or try again.</p>
        </div>
        
        <!-- CTA Button -->
        <div>
            <a href="{% url 'home' %}" 
               class="inline-block bg-[#FF5A1F] text-[#111111] text-base font-medium py-3 px-8 hover:bg-[#FF5A1F]/90 transition-colors duration-300">
                Back to Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
