{% extends "base.html" %}

{% block title %}Sign out — VULOR{% endblock %}

{% block content %}
<div class="px-4 py-16 min-h-[calc(100svh-4rem)] flex items-center justify-center">
    <div class="w-full max-w-md v-plate v-fade-in">
        <div class="p-8 sm:p-10">
            <p class="c-reg text-ink-3 mb-3">Access</p>
            <h1 class="c-monolith text-4xl mb-3">Signing <span class="c-serif-i normal-case">out?</span></h1>
            <p class="v-spec text-ink-3 mb-8">You can sign back in any time.</p>

            <form method="post" action="{% url 'account_logout' %}" class="space-y-4">
                {% csrf_token %}
                {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}">
                {% endif %}
                <button type="submit" class="v-btn v-btn--primary v-btn--lg w-full">Sign out</button>
            </form>

            <p class="v-spec text-ink-3 mt-8 text-center">
                <a href="{% url 'home' %}" class="v-underline text-ink-1">Never mind — keep shopping</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
