{% extends "base.html" %}

{% block title %}Check Your Email — VULOR{% endblock %}

{% block content %}
<div class="px-4 py-16 min-h-[calc(100svh-4rem)] flex items-center justify-center">
    <div class="w-full max-w-md v-plate v-fade-in">
        <div class="p-8 sm:p-10 text-center">
            <p class="v-label text-ink-3 mb-3">ACCESS</p>
            <h1 class="v-display text-4xl text-ink-1 mb-4">CHECK YOUR EMAIL.</h1>
            <p class="v-spec text-ink-2 mb-8">
                If an account matches, a reset link is on its way. It can take a few minutes to arrive.
            </p>
            <a href="{% url 'login' %}" class="v-btn v-btn--secondary">BACK TO SIGN IN</a>
        </div>
    </div>
</div>
{% endblock %}
