{% extends "base.html" %}

{% block title %}Password Changed — VULOR{% endblock %}

{% block content %}
<div class="px-4 py-16 min-h-[calc(100svh-4rem)] flex items-center justify-center">
    <div class="w-full max-w-md v-plate v-fade-in">
        <div class="p-8 sm:p-10 text-center">
            <p class="v-label text-ink-3 mb-3">ACCESS</p>
            <h1 class="v-display text-4xl v-unmask mb-4" style="color: var(--signal);">DONE.</h1>
            <p class="v-spec text-ink-2 mb-8">Your password has been changed. Sign in with it now.</p>
            <a href="{% url 'login' %}" class="v-btn v-btn--primary">SIGN IN</a>
        </div>
    </div>
</div>
{% endblock %}
